<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e8eaed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #chat-container {
      width: 100%;
      max-width: 500px;
      height: 600px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-header {
      background: #1a73e8;
      color: #fff;
      padding: 18px 20px;
    }
    #chat-header h1 { font-size: 18px; }
    #chat-header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .user {
      background: #1a73e8;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bot {
      background: #f1f3f4;
      color: #202124;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    #typing {
      display: none;
      align-self: flex-start;
      background: #f1f3f4;
      color: #5f6368;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      font-style: italic;
    }
    #input-area {
      display: flex;
      border-top: 1px solid #e0e0e0;
      padding: 12px 16px;
      gap: 8px;
    }
    #input-area input {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
    }
    #input-area input:focus { border-color: #1a73e8; }
    #input-area button {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    #input-area button:hover { background: #1557b0; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <h1>🤖 AI Assistant</h1>
      <p>Powered by Gemini + Composio</p>
    </div>
    <div id="chat-box"></div>
    <div id="typing">Thinking...</div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="Type your message..." autofocus>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script>
    const chatBox = document.getElementById('chat-box');
    const typing = document.getElementById('typing');
    const input = document.getElementById('msg-input');

    function addMessage(text, cls) {
      const div = document.createElement('div');
      div.className = 'message ' + cls;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage(text, 'user');
      typing.style.display = 'block';
      chatBox.scrollTop = chatBox.scrollHeight;
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        addMessage(data.reply, 'bot');
      } catch {
        addMessage('Sorry, something went wrong. Please try again.', 'bot');
      } finally {
        typing.style.display = 'none';
      }
    }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
